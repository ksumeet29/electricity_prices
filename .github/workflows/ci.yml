name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  bazel-build:
    name: Bazel build & smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install libcurl dev headers
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Set up Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', 'BUILD.bazel') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Build elpris
        run: bazel build --curses=no //:elpris

      - name: Smoke test --help-ish invocation (invalid cycle should fail cleanly)
        run: |
          set +e
          ./bazel-bin/elpris --area SE3 --cycle 9 --json
          status=$?
          set -e
          if [ "$status" -ne 1 ]; then
            echo "Expected exit code 1 for invalid cycle, got $status"
            exit 1
          fi

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: elpris-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container and check health endpoint
        run: |
          docker run -d --name elpris-ci -p 8080:8080 elpris-web:ci
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/healthz > /dev/null; then
              echo "Service is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Service did not become healthy in time"
          docker logs elpris-ci
          exit 1

      - name: Verify index page renders
        run: curl -sf http://localhost:8080/ | grep -q "Cheapest Washing Time Finder"

      - name: Clean up container
        if: always()
        run: docker rm -f elpris-ci || true
